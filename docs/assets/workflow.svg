<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 280" role="img" aria-label="Chrome Extension Tester MCP workflow">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#38bdf8"/>
    </marker>
  </defs>
  <rect width="960" height="280" rx="16" fill="url(#bg)"/>
  <text x="480" y="36" text-anchor="middle" fill="#e2e8f0" font-family="system-ui,sans-serif" font-size="18" font-weight="600">How it works</text>

  <!-- IDE -->
  <rect x="40" y="70" width="180" height="140" rx="12" fill="#1e3a5f" stroke="#38bdf8" stroke-width="2"/>
  <text x="130" y="110" text-anchor="middle" fill="#7dd3fc" font-family="system-ui,sans-serif" font-size="14" font-weight="600">Your IDE</text>
  <text x="130" y="135" text-anchor="middle" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="11">Cursor · VS Code</text>
  <text x="130" y="155" text-anchor="middle" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="11">Claude Desktop</text>
  <text x="130" y="185" text-anchor="middle" fill="#64748b" font-family="system-ui,sans-serif" font-size="10">AI writes extension code</text>

  <!-- MCP -->
  <rect x="290" y="95" width="160" height="90" rx="12" fill="#312e81" stroke="#a78bfa" stroke-width="2"/>
  <text x="370" y="130" text-anchor="middle" fill="#c4b5fd" font-family="system-ui,sans-serif" font-size="13" font-weight="600">MCP Server</text>
  <text x="370" y="155" text-anchor="middle" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="10">stdio tools</text>

  <!-- Browser -->
  <rect x="520" y="70" width="200" height="140" rx="12" fill="#14532d" stroke="#4ade80" stroke-width="2"/>
  <text x="620" y="110" text-anchor="middle" fill="#86efac" font-family="system-ui,sans-serif" font-size="14" font-weight="600">Chromium</text>
  <text x="620" y="135" text-anchor="middle" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="11">+ your extension</text>
  <text x="620" y="165" text-anchor="middle" fill="#64748b" font-family="system-ui,sans-serif" font-size="10">screenshots · clicks · logs</text>

  <!-- Output -->
  <rect x="780" y="95" width="140" height="90" rx="12" fill="#422006" stroke="#fbbf24" stroke-width="2"/>
  <text x="850" y="130" text-anchor="middle" fill="#fde68a" font-family="system-ui,sans-serif" font-size="13" font-weight="600">Feedback</text>
  <text x="850" y="155" text-anchor="middle" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="10">to the AI loop</text>

  <line x1="220" y1="140" x2="290" y2="140" stroke="#38bdf8" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="450" y1="140" x2="520" y2="140" stroke="#38bdf8" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="720" y1="140" x2="780" y2="140" stroke="#38bdf8" stroke-width="2" marker-end="url(#arrow)"/>
</svg>
